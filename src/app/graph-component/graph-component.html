<h2>Simulacion {{this.getNombreSimulacion()}}</h2>
<h2>Algoritmo: {{this.getAlgoritmo()}}</h2>
<h2>Clock: {{this.getClock()}}</h2>
<section class="contenedorcito">

  <section id="graph-container" class="card-container">
    @for(state of states; track state) {
      <app-state-queue-component  [queueName]="state"></app-state-queue-component>
    }
  </section>

  <section class="button-section">
    <button (click)="siguientePaso()" class="button comenzar">Ejecutar siguiente paso</button>
    <button (click)="ejecucionCompleta()" [disabled]="!firstTime" [class.firstTime]="!firstTime"  class="button comenzar">Ejecución completa</button>
  </section>

</section>
