<form class="form" [formGroup]="algorithmForm"  (submit)="onSubmit()">

  <fieldset>

    <legend>Nueva simulacion</legend>

    <label for="nombre">Nombre de la simulacion</label>
    <input [class.invalid]="algorithmForm.get('simulationName')?.invalid" class="input" type="text" name="nombre" id="nombre" formControlName="simulationName" placeholder="Nombre de la simulacion">

    <label for="algoritmo">Elegir el algoritmo de planificacion</label>
    <select [class.invalid]="algorithmForm.get('algorithmName')?.invalid" id="algoritmo" name="algoritmo" formControlName="algorithmName">
      <option value="first_come_first_serve">First come First Serve</option>
      <option value="round_robin">Round Robin</option>
      <option value="prioridad">Prioridad</option>
      <option value="shortest_job_first">Shortest Job First sin desalojo</option>
      <option value="shortest_job_first_preemptive">Shortest Job First con desalojo</option>
    </select>
    <p>Nota: De momento esta solamente implementado el First come First Serve (FCFS), Prioridad y Shortest job First sin desalojo</p>

    <div id="opciones-extra">

    </div>

    <button [class.invalidForm]="algorithmForm.invalid" [disabled]="algorithmForm.invalid" type="submit" class="button">Guardar</button>
  </fieldset>
</form>
