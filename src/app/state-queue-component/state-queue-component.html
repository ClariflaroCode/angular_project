<article class="card">
  <header class="card-header"><h3>{{this.getQueueName()}}</h3></header>
  <footer class="card-footer">
    <ul>
      <li>
        <button [routerLink]="['/processes']" [queryParams]="{ state: queueName, id_simulacion: currentID }" [disabled]="this.currentID == ''" class="button">Ver más</button>
      </li>
    </ul>
  </footer>
</article>
